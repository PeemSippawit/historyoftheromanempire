    <section class="era-page kingdom-bg">

        <div class="content-box">

            <h1>Roman Kingdom</h1>

            <p>753 BC – 509 BC</p>

            <p>
                The Roman Kingdom represents the earliest period
                of Roman history, traditionally beginning with
                Romulus and ending with the overthrow of the last king.
            </p>

            <div class="timeline-container">

                <div class="timeline-line"></div>

                <div class="timeline">

                    <div class="timeline-event">
                        <div
                            class="timeline-dot"
                            data-title="753 BC — Founding of Rome"
                            data-content="According to Roman tradition, Romulus founded the city of Rome in 753 BC after defeating his twin brother Remus. This event marks the beginning of Roman history.">
                        </div>

                        <span>753 BC</span>
                    </div>

                    <div class="timeline-event">
                        <div
                            class="timeline-dot"
                            data-title="716 BC — Numa Pompilius"
                            data-content="Numa Pompilius became the second king of Rome and is remembered for establishing many religious institutions and traditions.">
                        </div>

                        <span>716 BC</span>
                    </div>

                    <div class="timeline-event">
                        <div
                            class="timeline-dot"
                            data-title="616 BC — Tarquinius Priscus"
                            data-content="Tarquinius Priscus became Rome's fifth king and initiated major public works and infrastructure projects.">
                        </div>

                        <span>616 BC</span>
                    </div>

                    <div class="timeline-event">
                        <div
                            class="timeline-dot"
                            data-title="509 BC — Fall of the Monarchy"
                            data-content="The Roman monarchy ended when Lucius Tarquinius Superbus was overthrown. The Roman Republic was established shortly afterward.">
                        </div>

                        <span>509 BC</span>
                    </div>

                </div>

            </div>

            <div id="tooltip"></div>

            <div id="modal-overlay">

                <div id="event-modal">

                    <button id="close-modal">&times;</button>

                    <h2 id="modal-title"></h2>

                    <p id="modal-content"></p>

                </div>

            </div>

        </div>

    </section>
