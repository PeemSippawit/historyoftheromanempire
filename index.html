<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roman History Timeline</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Top Era Bar -->
  <div class="era-bar">
    <button onclick="switchEra('kingdom')">Roman Kingdom</button>
    <button onclick="switchEra('republic')">Roman Republic</button>
    <button onclick="switchEra('empire')">Roman Empire</button>
    <button onclick="switchEra('byzantine')">Byzantine Empire</button>
  </div>

  <!-- ERA CONTAINERS -->
  <div id="kingdom" class="era active" style="--bg:url('kingdom.jpg')">
    <div class="timeline">
      <div class="dot" data-title="753 BC" data-text="Founding of Rome by Romulus."></div>
      <div class="dot" data-title="616 BC" data-text="Etruscan kings influence Rome."></div>
      <div class="dot" data-title="509 BC" data-text="Last king overthrown; Republic begins."></div>
    </div>
  </div>

  <div id="republic" class="era" style="--bg:url('republic.jpg')">
    <div class="timeline">
      <div class="dot" data-title="450 BC" data-text="Twelve Tables law code established."></div>
      <div class="dot" data-title="264 BC" data-text="Punic Wars begin vs Carthage."></div>
      <div class="dot" data-title="44 BC" data-text="Julius Caesar assassinated."></div>
      <div class="dot" data-title="27 BC" data-text="Augustus becomes first emperor."></div>
    </div>
  </div>

  <div id="empire" class="era" style="--bg:url('empire.jpg')">
    <div class="timeline">
      <div class="dot" data-title="AD 117" data-text="Roman Empire reaches maximum territorial extent."></div>
      <div class="dot" data-title="AD 212" data-text="Caracalla grants citizenship to all free men."></div>
      <div class="dot" data-title="AD 284" data-text="Diocletian reforms empire structure."></div>
      <div class="dot" data-title="AD 476" data-text="Western Roman Empire falls."></div>
    </div>
  </div>

  <div id="byzantine" class="era" style="--bg:url('byzantine.jpg')">
    <div class="timeline">
      <div class="dot" data-title="AD 330" data-text="Constantinople founded."></div>
      <div class="dot" data-title="AD 527" data-text="Justinian I begins reign."></div>
      <div class="dot" data-title="AD 1054" data-text="East-West Schism."></div>
      <div class="dot" data-title="AD 1453" data-text="Fall of Constantinople."></div>
    </div>
  </div>

  <!-- POPUP MODAL -->
  <div id="modal">
    <div class="modal-content">
      <span onclick="closeModal()" class="close">&times;</span>
      <h2 id="modal-title"></h2>
      <p id="modal-text"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
